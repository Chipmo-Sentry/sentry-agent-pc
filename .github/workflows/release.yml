name: release

# Build the Windows .exe and publish it to a GitHub Release whenever a
# version tag is pushed. The agent's in-app updater reads /releases/latest,
# so the asset MUST be named ChipmoSentryAgent.exe (see updater.ASSET_NAME).
#
#   git tag v0.2.0 && git push origin v0.2.0
#
# The tag's version must match src/sentry_agent_pc/__init__.py __version__,
# otherwise the build fails fast (prevents shipping a mislabeled binary).

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # needed to create the release + upload assets

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      # Actions pinned to full commit SHAs (supply-chain: this pipeline
      # auto-installs binaries on store PCs — a hijacked floating tag would ship
      # to every machine). Trailing comment = the human-readable version.
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
        with:
          python-version: "3.11"

      - name: Sync dependencies
        run: uv sync --all-extras --dev

      - name: Verify tag matches __version__
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}".TrimStart("v")
          $code = uv run python -c "from sentry_agent_pc import __version__; print(__version__)"
          $code = $code.Trim()
          Write-Host "tag=$tag  __version__=$code"
          if ($tag -ne $code) {
            Write-Error "Tag '$tag' does not match __version__ '$code'. Bump src/sentry_agent_pc/__init__.py first."
            exit 1
          }

      # Test gate — fail-fast BEFORE building/publishing, so a tag pushed from an
      # unverified branch can never ship untested code. Mirrors ci.yml's checks.
      - name: Ruff — lint
        run: uv run ruff check src tests

      - name: Mypy — strict type-check
        run: uv run mypy src/sentry_agent_pc

      - name: Pytest — unit tests
        run: uv run pytest tests/ -q

      - name: Build .exe
        shell: pwsh
        run: .\scripts\build_exe.ps1

      - name: Verify build + package onedir zip
        shell: pwsh
        run: |
          if (-not (Test-Path "dist\ChipmoSentryAgent\ChipmoSentryAgent.exe")) {
            Write-Error "Build produced no dist\ChipmoSentryAgent\ChipmoSentryAgent.exe"
            exit 1
          }
          # Zip the onedir CONTENTS (exe + _internal at the zip root) for the
          # in-app self-updater.
          Compress-Archive -Path "dist\ChipmoSentryAgent\*" `
            -DestinationPath "dist\ChipmoSentryAgent-windows.zip" -Force
          Get-Item "dist\ChipmoSentryAgent-windows.zip" | Select-Object Name, Length
          # Publish a SHA-256 sidecar — the in-app updater REFUSES to apply a
          # release without a verifiable checksum (updater.download_asset).
          $hash = (Get-FileHash "dist\ChipmoSentryAgent-windows.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  ChipmoSentryAgent-windows.zip" | `
            Out-File -Encoding ascii -NoNewline "dist\ChipmoSentryAgent-windows.zip.sha256"
          Write-Host "sha256=$hash"

      # Detached Ed25519 signature over the zip's SHA-256 — the real authenticity
      # gate (updater._verify_signature). Runs only once the RELEASE_SIGNING_KEY
      # secret exists, so releases keep building before signing is activated; the
      # .sig is uploaded as an extra asset after the release is created (so it
      # stays out of the fail_on_unmatched_files list while optional).
      - name: Check signing key
        id: signcheck
        shell: bash
        env:
          SIGNING_KEY: ${{ secrets.RELEASE_SIGNING_KEY }}
        run: |
          if [ -n "$SIGNING_KEY" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::RELEASE_SIGNING_KEY not set — release is unsigned (SHA-256 only)."
          fi

      - name: Sign release zip (Ed25519)
        if: steps.signcheck.outputs.enabled == 'true'
        shell: bash
        env:
          SIGNING_KEY: ${{ secrets.RELEASE_SIGNING_KEY }}
        run: uv run python scripts/sign_release.py dist/ChipmoSentryAgent-windows.zip

      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          $ver = "${{ github.ref_name }}".TrimStart("v")
          & "$iscc" "/DAppVersion=$ver" "installer\ChipmoSentry.iss"
          if (-not (Test-Path "dist\ChipmoSentryAgent-Setup.exe")) {
            Write-Error "Inno Setup produced no dist\ChipmoSentryAgent-Setup.exe"
            exit 1
          }
          Get-Item "dist\ChipmoSentryAgent-Setup.exe" | Select-Object Name, Length

      - name: Publish release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          files: |
            dist/ChipmoSentryAgent-Setup.exe
            dist/ChipmoSentryAgent-windows.zip
            dist/ChipmoSentryAgent-windows.zip.sha256
          generate_release_notes: true
          fail_on_unmatched_files: true

      # Attach the signature as an extra asset (only when signing is active). Kept
      # separate from the publish step's file list so an unsigned release (no
      # secret yet) doesn't trip fail_on_unmatched_files on a missing .sig.
      - name: Upload signature asset
        if: steps.signcheck.outputs.enabled == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            dist/ChipmoSentryAgent-windows.zip.sig --clobber
